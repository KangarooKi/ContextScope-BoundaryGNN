<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">BoundaryGNN-Logit Framework</title>
  <desc id="desc">A publication-style architecture diagram for BoundaryGNN-Logit, showing data inputs, weak label construction, profile-similarity edge typing, boundary-aware aggregation, and boundary-risk prediction.</desc>
  <defs>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4b5563" />
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c" />
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
    <style>
      .page { fill: #ffffff; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .box-title { font: 700 21px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-text { font: 400 17px Arial, Helvetica, sans-serif; fill: #374151; }
      .small-text { font: 400 15px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .tiny-text { font: 400 13px Arial, Helvetica, sans-serif; fill: #6b7280; }
      .formula { font: 500 18px "Times New Roman", Times, serif; fill: #111827; }
      .module-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 14; }
      .module-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 16; }
      .module-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 13; }
      .module-purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; rx: 13; }
      .inner { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.6; rx: 10; }
      .inner-blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.6; rx: 10; }
      .inner-orange { fill: #ffedd5; stroke: #fb923c; stroke-width: 1.6; rx: 10; }
      .inner-green { fill: #dcfce7; stroke: #4ade80; stroke-width: 1.6; rx: 10; }
      .edge-gray { fill: none; stroke: #4b5563; stroke-width: 2.4; marker-end: url(#arrow-gray); }
      .edge-blue { fill: none; stroke: #2563eb; stroke-width: 2.6; marker-end: url(#arrow-blue); }
      .edge-orange { fill: none; stroke: #ea580c; stroke-width: 2.6; marker-end: url(#arrow-orange); }
      .edge-purple { fill: none; stroke: #7c3aed; stroke-width: 2.4; marker-end: url(#arrow-purple); }
      .edge-dashed { fill: none; stroke: #7c3aed; stroke-width: 2.4; stroke-dasharray: 9 7; marker-end: url(#arrow-purple); }
      .graph-edge { stroke: #64748b; stroke-width: 3; stroke-linecap: round; }
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 3; }
      .node-orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; }
      .node-green { fill: #ecfdf5; stroke: #16a34a; stroke-width: 3; }
      .tag { fill: #ffffff; stroke: #bfdbfe; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="980" />

  <text class="title" x="900" y="54" text-anchor="middle">BoundaryGNN-Logit Framework</text>
  <text class="subtitle" x="900" y="86" text-anchor="middle">Boundary-aware social graph representation for identifying high-risk circle-boundary nodes</text>

  <!-- Input module -->
  <rect class="module-blue" x="65" y="210" width="290" height="330" />
  <text class="box-title" x="210" y="250" text-anchor="middle">Google+ Ego Network</text>

  <line class="graph-edge" x1="158" y1="313" x2="223" y2="285" />
  <line class="graph-edge" x1="158" y1="313" x2="245" y2="365" />
  <line class="graph-edge" x1="223" y1="285" x2="286" y2="322" />
  <line class="graph-edge" x1="245" y1="365" x2="286" y2="322" />
  <line class="graph-edge" x1="125" y1="376" x2="158" y2="313" />
  <line class="graph-edge" x1="125" y1="376" x2="245" y2="365" />
  <circle class="node" cx="158" cy="313" r="18" />
  <circle class="node" cx="223" cy="285" r="18" />
  <circle class="node-orange" cx="286" cy="322" r="18" />
  <circle class="node-green" cx="245" cy="365" r="18" />
  <circle class="node" cx="125" cy="376" r="18" />

  <rect class="tag" x="105" y="424" width="210" height="34" />
  <text class="box-text" x="210" y="447" text-anchor="middle">Friendship Edges</text>
  <rect class="tag" x="105" y="467" width="210" height="34" />
  <text class="box-text" x="210" y="490" text-anchor="middle">Profile Attributes</text>
  <rect class="tag" x="105" y="510" width="210" height="34" />
  <text class="box-text" x="210" y="533" text-anchor="middle">Circle Annotations</text>

  <!-- Weak-label module -->
  <rect class="module-purple" x="430" y="130" width="315" height="150" />
  <text class="box-title" x="588" y="169" text-anchor="middle">Weak Boundary Labels</text>
  <rect class="inner" x="462" y="192" width="252" height="62" />
  <text class="small-text" x="588" y="216" text-anchor="middle">multi-circle membership</text>
  <text class="small-text" x="588" y="238" text-anchor="middle">cross-circle exposure</text>

  <!-- Profile-similarity module -->
  <rect class="module-blue" x="430" y="360" width="315" height="185" />
  <text class="box-title" x="588" y="398" text-anchor="middle">Profile Similarity</text>
  <text class="small-text" x="588" y="428" text-anchor="middle">score each friendship edge</text>
  <rect class="inner" x="465" y="454" width="245" height="56" />
  <text class="formula" x="588" y="489" text-anchor="middle">J(u,v) = |P<tspan baseline-shift="sub" font-size="13">u</tspan> ∩ P<tspan baseline-shift="sub" font-size="13">v</tspan>| / |P<tspan baseline-shift="sub" font-size="13">u</tspan> ∪ P<tspan baseline-shift="sub" font-size="13">v</tspan>|</text>

  <!-- Edge-type modules -->
  <rect class="module-orange" x="815" y="310" width="245" height="96" />
  <text class="box-title" x="938" y="349" text-anchor="middle">Similar Edges</text>
  <text class="small-text" x="938" y="376" text-anchor="middle">high profile overlap</text>

  <rect class="module-orange" x="815" y="475" width="245" height="96" />
  <text class="box-title" x="938" y="514" text-anchor="middle">Dissimilar Edges</text>
  <text class="small-text" x="938" y="541" text-anchor="middle">low profile overlap</text>

  <!-- Aggregation module -->
  <rect class="module-green" x="1130" y="190" width="395" height="505" />
  <text class="box-title" x="1328" y="230" text-anchor="middle">Boundary-Aware Aggregation</text>

  <rect class="inner-green" x="1162" y="260" width="150" height="62" />
  <text class="box-text" x="1237" y="287" text-anchor="middle">Self</text>
  <text class="tiny-text" x="1237" y="307" text-anchor="middle">profile</text>

  <rect class="inner-green" x="1343" y="260" width="150" height="62" />
  <text class="box-text" x="1418" y="287" text-anchor="middle">All-neighbor</text>
  <text class="tiny-text" x="1418" y="307" text-anchor="middle">mean</text>

  <rect class="inner-blue" x="1162" y="355" width="150" height="62" />
  <text class="box-text" x="1237" y="382" text-anchor="middle">Similar</text>
  <text class="tiny-text" x="1237" y="402" text-anchor="middle">neighbor mean</text>

  <rect class="inner-orange" x="1343" y="355" width="150" height="62" />
  <text class="box-text" x="1418" y="382" text-anchor="middle">Dissimilar</text>
  <text class="tiny-text" x="1418" y="402" text-anchor="middle">neighbor mean</text>

  <rect class="inner-green" x="1253" y="450" width="150" height="62" />
  <text class="box-text" x="1328" y="477" text-anchor="middle">Structural</text>
  <text class="tiny-text" x="1328" y="497" text-anchor="middle">features</text>

  <rect class="inner" x="1194" y="578" width="268" height="66" />
  <text class="box-text" x="1328" y="604" text-anchor="middle">Concatenated Node</text>
  <text class="box-text" x="1328" y="628" text-anchor="middle">Representation</text>

  <!-- Prediction module -->
  <rect class="module-purple" x="1600" y="285" width="160" height="86" />
  <text class="box-title" x="1680" y="317" text-anchor="middle">Logistic</text>
  <text class="box-title" x="1680" y="345" text-anchor="middle">Classifier</text>

  <rect class="module-purple" x="1600" y="430" width="160" height="86" />
  <text class="box-title" x="1680" y="462" text-anchor="middle">Boundary-Risk</text>
  <text class="box-title" x="1680" y="490" text-anchor="middle">Probability</text>

  <rect class="module-purple" x="1580" y="575" width="200" height="96" />
  <text class="box-title" x="1680" y="613" text-anchor="middle">High-Risk</text>
  <text class="box-title" x="1680" y="641" text-anchor="middle">Boundary Nodes</text>

  <!-- Main flow arrows -->
  <path class="edge-purple" d="M315 527 C365 527, 375 205, 428 205" />
  <path class="edge-gray" d="M315 441 C365 441, 375 421, 428 421" />
  <path class="edge-gray" d="M315 484 C365 484, 375 480, 428 480" />

  <path class="edge-blue" d="M745 430 C775 430, 775 358, 813 358" />
  <path class="edge-orange" d="M745 480 C775 480, 775 523, 813 523" />

  <path class="edge-blue" d="M1060 358 C1088 358, 1098 386, 1160 386" />
  <path class="edge-orange" d="M1060 523 C1096 523, 1102 386, 1341 386" />

  <path class="edge-gray" d="M745 452 C932 452, 956 291, 1160 291" />
  <path class="edge-gray" d="M355 441 C728 441, 922 291, 1341 291" />
  <path class="edge-gray" d="M355 484 C728 484, 890 481, 1251 481" />

  <path class="edge-gray" d="M1237 322 L1237 576" />
  <path class="edge-gray" d="M1418 322 L1418 576" />
  <path class="edge-blue" d="M1237 417 L1237 576" />
  <path class="edge-orange" d="M1418 417 L1418 576" />
  <path class="edge-gray" d="M1328 512 L1328 576" />

  <path class="edge-gray" d="M1462 611 C1515 611, 1532 328, 1598 328" />
  <path class="edge-purple" d="M1680 371 L1680 428" />
  <path class="edge-purple" d="M1680 516 L1680 573" />

  <!-- Dashed supervision arrow routed above the model to avoid overlap -->
  <path class="edge-dashed" d="M745 184 C1010 95, 1470 105, 1660 283" />
  <text class="tiny-text" x="1190" y="126" text-anchor="middle">training supervision</text>

  <!-- Legend -->
  <rect class="inner" x="70" y="800" width="520" height="90" />
  <text class="small-text" x="92" y="828">Legend</text>
  <line x1="92" y1="852" x2="150" y2="852" stroke="#2563eb" stroke-width="4" />
  <text class="tiny-text" x="166" y="857">similar-edge branch</text>
  <line x1="310" y1="852" x2="368" y2="852" stroke="#ea580c" stroke-width="4" />
  <text class="tiny-text" x="384" y="857">dissimilar-edge branch</text>
  <line x1="92" y1="875" x2="150" y2="875" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 6" />
  <text class="tiny-text" x="166" y="880">weak-label supervision</text>
</svg>
